<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma's Rainbow World</title>
    <style>
        :root {
            --bg: #07060f;
            --spotify-h: 80px;
            --spotify-gap: 20px;
            --stage-top: calc(var(--spotify-h) + var(--spotify-gap));
            --bar-h: 52px;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.16);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            width: 100%;
            max-width: 100vw;
            overflow: hidden;
            overscroll-behavior: none;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }

        #rainbow-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #snow-container {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .spotify-top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            max-width: 100vw;
            height: var(--spotify-h);
            padding: 0 16px;
            z-index: 30;
            overflow: hidden;
            background: var(--bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 560px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            text-decoration: none;
            color: #fff;
            pointer-events: none;
        }

        .now-playing.is-link {
            pointer-events: auto;
            transition: background 0.15s ease;
        }

        .now-playing.is-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .now-playing-art {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.08);
        }

        .now-playing-meta {
            min-width: 0;
            flex: 1;
        }

        .now-playing-title {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing-artist {
            font-size: 0.8rem;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .now-playing-progress {
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            margin-top: 8px;
            overflow: hidden;
        }

        .now-playing-progress span {
            display: block;
            height: 100%;
            width: 0%;
            background: #1db954;
            transition: width 0.8s linear;
        }

        .now-playing-idle {
            width: 100%;
            max-width: 560px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.85rem;
            text-align: center;
        }

        .now-playing-idle.hidden,
        .now-playing.hidden {
            display: none;
        }

        .stage {
            position: fixed;
            inset: var(--stage-top) 0 var(--bar-h) 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 10px 0;
            background: transparent;
        }

        .stage img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 1;
            transition: opacity 0.55s ease;
            border-radius: 8px;
        }

        .stage img.fade-out { opacity: 0; }

        .controls {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: var(--bar-h);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 10px;
            background: rgba(8, 7, 18, 0.92);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 30;
        }

        .btn {
            border: 1px solid var(--border);
            background: var(--glass);
            color: #fff;
            border-radius: 999px;
            cursor: pointer;
            min-width: 40px;
            height: 36px;
            padding: 0 12px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.18); }
        .btn:active { transform: scale(0.96); }

        .btn.primary {
            background: linear-gradient(45deg, #ff0055, #9900ff);
            border: none;
            min-width: 44px;
        }

        .btn.rainbow {
            background: linear-gradient(45deg, #ff0055, #9900ff, #0099ff);
            background-size: 200% 200%;
            border: none;
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .counter {
            min-width: 76px;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 600;
            opacity: 0.9;
            user-select: none;
        }

        .status {
            position: fixed;
            top: calc(var(--stage-top) - 10px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }

        .status.show { opacity: 1; }

        .flake {
            position: absolute;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 520px) {
            :root { --spotify-h: 80px; }
            .btn.hide-mobile { display: none; }
            .counter { min-width: 64px; font-size: 0.72rem; }
        }
    </style>
</head>
<body>
    <canvas id="rainbow-canvas"></canvas>
    <div id="snow-container"></div>

    <div class="spotify-top-bar">
        <a class="now-playing hidden" id="now-playing" href="#" tabindex="-1" aria-live="polite">
            <img class="now-playing-art" id="np-art" alt="" width="56" height="56" />
            <div class="now-playing-meta">
                <div class="now-playing-title" id="np-title"></div>
                <div class="now-playing-artist" id="np-artist"></div>
                <div class="now-playing-progress"><span id="np-progress"></span></div>
            </div>
        </a>
        <div class="now-playing-idle" id="now-playing-idle">Nothing playing on Spotify</div>
    </div>

    <div class="stage">
        <img id="photo" alt="Gemma photo" />
    </div>

    <div class="status" id="status">Loading photos…</div>

    <div class="controls">
        <button class="btn hide-mobile" id="btn-prev" aria-label="Previous photo">‹</button>
        <button class="btn primary" id="btn-play" aria-label="Pause slideshow">⏸</button>
        <button class="btn hide-mobile" id="btn-next" aria-label="Next photo">›</button>
        <button class="btn" id="btn-shuffle" aria-label="Shuffle photos">🔀</button>
        <button class="btn rainbow" id="btn-rainbow" aria-label="More rainbows">Rainbows!</button>
        <span class="counter" id="counter">…</span>
    </div>

    <script>
        const NOW_PLAYING_POLL_MS = 15000;
        const DEFAULT_NOW_PLAYING_API = 'https://helpdesk.kingsburyhigh.org.uk/api/gemmanite/now-playing';

        let nowPlayingApi = DEFAULT_NOW_PLAYING_API;
        let photos = [];
        let order = [];
        let index = 0;
        let intervalMs = 5000;
        let timer = null;
        let playing = true;
        let busy = false;

        const photoEl = document.getElementById('photo');
        const counterEl = document.getElementById('counter');
        const statusEl = document.getElementById('status');
        const btnPlay = document.getElementById('btn-play');
        const nowPlayingEl = document.getElementById('now-playing');
        const nowPlayingIdleEl = document.getElementById('now-playing-idle');
        const npArtEl = document.getElementById('np-art');
        const npTitleEl = document.getElementById('np-title');
        const npArtistEl = document.getElementById('np-artist');
        const npProgressEl = document.getElementById('np-progress');

        function updateNowPlayingUI(data) {
            const track = data && data.track;
            const showTrack = !!(data && data.ok && track && track.name);

            if (!showTrack) {
                nowPlayingEl.classList.add('hidden');
                nowPlayingIdleEl.classList.remove('hidden');
                nowPlayingIdleEl.textContent = data && data.configured === false
                    ? 'Spotify not connected yet'
                    : 'Nothing playing on Spotify';
                return;
            }

            nowPlayingIdleEl.classList.add('hidden');
            nowPlayingEl.classList.remove('hidden');

            npTitleEl.textContent = track.name;
            npArtistEl.textContent = track.artist || track.album || '';
            npArtEl.src = track.imageUrl || '';
            npArtEl.alt = track.name;

            const duration = Number(track.durationMs) || 0;
            const progress = Number(track.progressMs) || 0;
            const pct = duration > 0 ? Math.min(100, (progress / duration) * 100) : 0;
            npProgressEl.style.width = `${pct}%`;

            if (track.url) {
                nowPlayingEl.href = track.url;
                nowPlayingEl.classList.add('is-link');
                nowPlayingEl.setAttribute('aria-label', `Open ${track.name} in Spotify`);
                nowPlayingEl.tabIndex = 0;
            } else {
                nowPlayingEl.removeAttribute('href');
                nowPlayingEl.classList.remove('is-link');
                nowPlayingEl.tabIndex = -1;
            }
        }

        async function refreshNowPlaying() {
            try {
                const res = await fetch(`${nowPlayingApi}?t=${Date.now()}`, { cache: 'no-store' });
                const data = await res.json();
                updateNowPlayingUI(data);
            } catch (_) {
                updateNowPlayingUI({ ok: false, track: null });
            }
        }

        async function loadSiteConfig() {
            try {
                const res = await fetch('site-config.json', { cache: 'no-store' });
                const cfg = await res.json();
                if (cfg.nowPlayingApiUrl) nowPlayingApi = cfg.nowPlayingApiUrl;
            } catch (_) { /* use default */ }
        }

        function flashStatus(text) {
            statusEl.textContent = text;
            statusEl.classList.add('show');
            clearTimeout(flashStatus._t);
            flashStatus._t = setTimeout(() => statusEl.classList.remove('show'), 1800);
        }

        function shuffle(array) {
            const a = array.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function rebuildOrder(startIndex = 0) {
            order = shuffle(photos.map((_, i) => i));
            index = Math.max(0, Math.min(startIndex, order.length - 1));
        }

        function updateCounter() {
            counterEl.textContent = order.length
                ? `${index + 1} / ${order.length}`
                : '0 / 0';
        }

        function setPlaying(on) {
            playing = on;
            btnPlay.textContent = on ? '⏸' : '▶';
            btnPlay.setAttribute('aria-label', on ? 'Pause slideshow' : 'Play slideshow');
            if (on) startTimer();
            else clearInterval(timer);
        }

        function startTimer() {
            clearInterval(timer);
            if (playing && order.length > 1) {
                timer = setInterval(() => showNext(), intervalMs);
            }
        }

        function preload(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(src);
                img.onerror = reject;
                img.src = src;
            });
        }

        async function showAt(orderIndex) {
            if (!order.length || busy) return;
            busy = true;
            index = (orderIndex + order.length) % order.length;
            const src = photos[order[index]];

            try {
                await preload(src);
                photoEl.classList.add('fade-out');
                await new Promise(r => setTimeout(r, 180));
                photoEl.src = src;
                photoEl.alt = `Photo ${index + 1}`;
                photoEl.classList.remove('fade-out');
                updateCounter();
            } catch (_) {
                flashStatus('Photo failed to load');
            } finally {
                busy = false;
            }
        }

        function showNext() { return showAt(index + 1); }
        function showPrev() { return showAt(index - 1); }

        function reshufflePhotos() {
            if (!photos.length) return;
            rebuildOrder(0);
            flashStatus('Photos shuffled');
            showAt(0);
            startTimer();
        }

        document.getElementById('btn-next').addEventListener('click', () => showNext().then(startTimer));
        document.getElementById('btn-prev').addEventListener('click', () => showPrev().then(startTimer));
        document.getElementById('btn-play').addEventListener('click', () => setPlaying(!playing));
        document.getElementById('btn-shuffle').addEventListener('click', reshufflePhotos);
        document.getElementById('btn-rainbow').addEventListener('click', burstRainbows);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showNext().then(startTimer);
            if (e.key === 'ArrowLeft') showPrev().then(startTimer);
            if (e.key === ' ') { e.preventDefault(); setPlaying(!playing); }
        });

        async function initSlideshow() {
            try {
                const photosRes = await fetch(`photos.json?t=${Date.now()}`, { cache: 'no-store' });
                const data = await photosRes.json();
                photos = Array.isArray(data.photos) ? data.photos : [];
                intervalMs = (data.intervalSeconds || 5) * 1000;
            } catch (_) {
                photos = [];
            }

            if (!photos.length) {
                counterEl.textContent = 'No photos';
                flashStatus('No photos found');
                setPlaying(false);
                return;
            }

            rebuildOrder(0);
            flashStatus(`${photos.length} photos — shuffling`);
            await showAt(0);
            setPlaying(true);
        }

        initSlideshow();
        loadSiteConfig().then(() => {
            refreshNowPlaying();
            setInterval(refreshNowPlaying, NOW_PLAYING_POLL_MS);
        });

        const snowContainer = document.getElementById('snow-container');
        const colors = ['#ff3366', '#ff9933', '#ffff33', '#33cc33', '#3399ff', '#9933ff'];
        const elements = ['🌈', '✨', '⭐', '🎈', '🌸'];

        function createFlake(isBurst = false) {
            const flake = document.createElement('div');
            flake.className = 'flake';
            if (Math.random() > 0.4) {
                flake.innerText = elements[Math.floor(Math.random() * elements.length)];
            } else {
                flake.innerText = '●';
                flake.style.color = colors[Math.floor(Math.random() * colors.length)];
                flake.style.textShadow = '0 0 8px ' + flake.style.color;
            }
            flake.style.left = (Math.random() * window.innerWidth) + 'px';
            flake.style.fontSize = (Math.random() * 1.2 + 0.6) + 'rem';
            const duration = isBurst ? (Math.random() * 2 + 1.5) : (Math.random() * 4 + 4);
            flake.style.animationDuration = duration + 's';
            if (isBurst) {
                flake.style.top = (Math.random() * (window.innerHeight * 0.3) + (window.innerHeight * 0.35)) + 'px';
            }
            snowContainer.appendChild(flake);
            setTimeout(() => flake.remove(), duration * 1000);
        }

        setInterval(() => {
            if (document.querySelectorAll('.flake').length < 40) createFlake();
        }, 300);

        function burstRainbows() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => createFlake(true), i * 15);
            }
        }

        const canvas = document.getElementById('rainbow-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let mouse = { x: width / 2, y: height / 2 };
        let hue = 0;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        }, { passive: true });

        (function animateCanvas() {
            ctx.fillStyle = 'rgba(7, 6, 15, 0.08)';
            ctx.fillRect(0, 0, width, height);
            const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 10, mouse.x, mouse.y, 140);
            gradient.addColorStop(0, `hsla(${hue}, 100%, 65%, 0.12)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 140, 0, Math.PI * 2);
            ctx.fill();
            hue = (hue + 1.5) % 360;
            requestAnimationFrame(animateCanvas);
        })();
    </script>
</body>
</html>
