<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma's Rainbow World</title>
    <style>
        :root {
            --bg: #07060f;
            --bar-h: 52px;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.16);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }

        .stage {
            position: fixed;
            inset: 0 0 var(--bar-h) 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .stage img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 1;
            transition: opacity 0.55s ease;
        }

        .stage img.fade-out { opacity: 0; }

        .controls {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: var(--bar-h);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 12px;
            background: rgba(8, 7, 18, 0.92);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 20;
        }

        .btn {
            border: 1px solid var(--border);
            background: var(--glass);
            color: #fff;
            border-radius: 999px;
            cursor: pointer;
            min-width: 42px;
            height: 38px;
            padding: 0 14px;
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.18); }
        .btn:active { transform: scale(0.96); }
        .btn.primary {
            background: linear-gradient(45deg, #ff0055, #9900ff);
            border: none;
            min-width: 46px;
        }

        .counter {
            min-width: 88px;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 600;
            opacity: 0.9;
            user-select: none;
        }

        .status {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }

        .status.show { opacity: 1; }

        @media (max-width: 520px) {
            .btn.hide-mobile { display: none; }
            .counter { min-width: 72px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="stage">
        <img id="photo" alt="Gemma photo" />
    </div>

    <div class="status" id="status">Loading photos…</div>

    <div class="controls">
        <button class="btn hide-mobile" id="btn-prev" aria-label="Previous">‹</button>
        <button class="btn primary" id="btn-play" aria-label="Pause slideshow">⏸</button>
        <button class="btn hide-mobile" id="btn-next" aria-label="Next">›</button>
        <button class="btn" id="btn-shuffle" aria-label="Shuffle again">🔀</button>
        <span class="counter" id="counter">…</span>
    </div>

    <script>
        let photos = [];
        let order = [];
        let index = 0;
        let intervalMs = 5000;
        let timer = null;
        let playing = true;
        let busy = false;

        const photoEl = document.getElementById('photo');
        const counterEl = document.getElementById('counter');
        const statusEl = document.getElementById('status');
        const btnPlay = document.getElementById('btn-play');

        function flashStatus(text) {
            statusEl.textContent = text;
            statusEl.classList.add('show');
            clearTimeout(flashStatus._t);
            flashStatus._t = setTimeout(() => statusEl.classList.remove('show'), 1800);
        }

        function shuffle(array) {
            const a = array.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function rebuildOrder(startIndex = 0) {
            order = shuffle(photos.map((_, i) => i));
            index = Math.max(0, Math.min(startIndex, order.length - 1));
        }

        function updateCounter() {
            counterEl.textContent = order.length
                ? `${index + 1} / ${order.length}`
                : '0 / 0';
        }

        function setPlaying(on) {
            playing = on;
            btnPlay.textContent = on ? '⏸' : '▶';
            btnPlay.setAttribute('aria-label', on ? 'Pause slideshow' : 'Play slideshow');
            if (on) startTimer();
            else clearInterval(timer);
        }

        function startTimer() {
            clearInterval(timer);
            if (playing && order.length > 1) {
                timer = setInterval(() => showNext(), intervalMs);
            }
        }

        function preload(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(src);
                img.onerror = reject;
                img.src = src;
            });
        }

        async function showAt(orderIndex) {
            if (!order.length || busy) return;
            busy = true;
            index = (orderIndex + order.length) % order.length;
            const src = photos[order[index]];

            try {
                await preload(src);
                photoEl.classList.add('fade-out');
                await new Promise(r => setTimeout(r, 180));
                photoEl.src = src;
                photoEl.alt = `Photo ${index + 1}`;
                photoEl.classList.remove('fade-out');
                updateCounter();
            } catch (_) {
                flashStatus('Photo failed to load');
            } finally {
                busy = false;
            }
        }

        function showNext() { showAt(index + 1); }
        function showPrev() { showAt(index - 1); }

        function reshuffle() {
            if (!photos.length) return;
            rebuildOrder(0);
            flashStatus('Shuffled');
            showAt(0);
            startTimer();
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            showNext().then(startTimer);
        });
        document.getElementById('btn-prev').addEventListener('click', () => {
            showPrev().then(startTimer);
        });
        document.getElementById('btn-play').addEventListener('click', () => {
            setPlaying(!playing);
        });
        document.getElementById('btn-shuffle').addEventListener('click', reshuffle);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showNext().then(startTimer);
            if (e.key === 'ArrowLeft') showPrev().then(startTimer);
            if (e.key === ' ') { e.preventDefault(); setPlaying(!playing); }
        });

        async function init() {
            try {
                const res = await fetch('photos.json', { cache: 'no-store' });
                const data = await res.json();
                photos = Array.isArray(data.photos) ? data.photos : [];
                intervalMs = (data.intervalSeconds || 5) * 1000;
            } catch (_) {
                photos = [];
            }

            if (!photos.length) {
                counterEl.textContent = 'No photos';
                flashStatus('No photos found');
                setPlaying(false);
                return;
            }

            rebuildOrder(0);
            flashStatus(`${photos.length} photos — shuffling`);
            await showAt(0);
            setPlaying(true);
        }

        init();
    </script>
</body>
</html>
