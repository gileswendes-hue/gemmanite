<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma's Rainbow World</title>
    <style>
        :root {
            --bg: #07060f;
            --spotify-h: 80px;
            --bar-h: 52px;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.16);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            width: 100%;
            max-width: 100vw;
            overflow: hidden;
            overscroll-behavior: none;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }

        #rainbow-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #snow-container {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .spotify-top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            max-width: 100vw;
            height: var(--spotify-h);
            padding: 0 8px;
            z-index: 30;
            overflow: hidden;
            background: var(--bg);
        }

        .spotify-top-bar #embed-iframe,
        .spotify-top-bar iframe {
            width: 100% !important;
            max-width: 520px;
            height: 80px !important;
            margin: 0 auto;
            display: block;
            border: 0;
            border-radius: 12px;
            overflow: hidden;
        }

        .stage {
            position: fixed;
            inset: var(--spotify-h) 0 var(--bar-h) 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .stage img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 1;
            transition: opacity 0.55s ease;
            border-radius: 8px;
        }

        .stage img.fade-out { opacity: 0; }

        .controls {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: var(--bar-h);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 10px;
            background: rgba(8, 7, 18, 0.92);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 30;
        }

        .btn {
            border: 1px solid var(--border);
            background: var(--glass);
            color: #fff;
            border-radius: 999px;
            cursor: pointer;
            min-width: 40px;
            height: 36px;
            padding: 0 12px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.18); }
        .btn:active { transform: scale(0.96); }

        .btn.primary {
            background: linear-gradient(45deg, #ff0055, #9900ff);
            border: none;
            min-width: 44px;
        }

        .btn.music {
            background: linear-gradient(45deg, #1db954, #169c46);
            border: none;
        }

        .btn.rainbow {
            background: linear-gradient(45deg, #ff0055, #9900ff, #0099ff);
            background-size: 200% 200%;
            border: none;
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .counter {
            min-width: 76px;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 600;
            opacity: 0.9;
            user-select: none;
        }

        .status {
            position: fixed;
            top: calc(var(--spotify-h) - 6px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }

        .status.show { opacity: 1; }

        .flake {
            position: absolute;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 520px) {
            :root { --spotify-h: 80px; }
            .btn.hide-mobile { display: none; }
            .counter { min-width: 64px; font-size: 0.72rem; }
        }
    </style>
</head>
<body>
    <canvas id="rainbow-canvas"></canvas>
    <div id="snow-container"></div>

    <div class="spotify-top-bar"><div id="embed-iframe"></div></div>

    <div class="stage">
        <img id="photo" alt="Gemma photo" />
    </div>

    <div class="status" id="status">Loading photos…</div>

    <div class="controls">
        <button class="btn hide-mobile" id="btn-prev" aria-label="Previous photo">‹</button>
        <button class="btn primary" id="btn-play" aria-label="Pause slideshow">⏸</button>
        <button class="btn hide-mobile" id="btn-next" aria-label="Next photo">›</button>
        <button class="btn" id="btn-shuffle" aria-label="Shuffle photos">🔀</button>
        <button class="btn music" id="btn-music" aria-label="Play or pause music. Double-click for random song." title="Click: play/pause · Double-click: random song">♫</button>
        <button class="btn rainbow" id="btn-rainbow" aria-label="More rainbows">Rainbows!</button>
        <span class="counter" id="counter">…</span>
    </div>

    <script src="https://open.spotify.com/embed-podcast/iframe-api/v1" async></script>
    <script>
        const SPOTIFY_PLAYLIST_URL = 'https://open.spotify.com/playlist/4DaB0NVWfmH4KsyQo66xui';

        let photos = [];
        let order = [];
        let index = 0;
        let intervalMs = 5000;
        let timer = null;
        let playing = true;
        let busy = false;

        let spotifyController = null;
        let spotifyPlaying = false;
        let musicTracks = [];
        let musicOrder = [];
        let musicIndex = -1;
        let musicAdvancePending = false;

        const photoEl = document.getElementById('photo');
        const counterEl = document.getElementById('counter');
        const statusEl = document.getElementById('status');
        const btnPlay = document.getElementById('btn-play');
        const btnMusic = document.getElementById('btn-music');

        function flashStatus(text) {
            statusEl.textContent = text;
            statusEl.classList.add('show');
            clearTimeout(flashStatus._t);
            flashStatus._t = setTimeout(() => statusEl.classList.remove('show'), 1800);
        }

        function shuffle(array) {
            const a = array.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function rebuildOrder(startIndex = 0) {
            order = shuffle(photos.map((_, i) => i));
            index = Math.max(0, Math.min(startIndex, order.length - 1));
        }

        function updateCounter() {
            counterEl.textContent = order.length
                ? `${index + 1} / ${order.length}`
                : '0 / 0';
        }

        function setPlaying(on) {
            playing = on;
            btnPlay.textContent = on ? '⏸' : '▶';
            btnPlay.setAttribute('aria-label', on ? 'Pause slideshow' : 'Play slideshow');
            if (on) startTimer();
            else clearInterval(timer);
        }

        function startTimer() {
            clearInterval(timer);
            if (playing && order.length > 1) {
                timer = setInterval(() => showNext(), intervalMs);
            }
        }

        function preload(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(src);
                img.onerror = reject;
                img.src = src;
            });
        }

        async function showAt(orderIndex) {
            if (!order.length || busy) return;
            busy = true;
            index = (orderIndex + order.length) % order.length;
            const src = photos[order[index]];

            try {
                await preload(src);
                photoEl.classList.add('fade-out');
                await new Promise(r => setTimeout(r, 180));
                photoEl.src = src;
                photoEl.alt = `Photo ${index + 1}`;
                photoEl.classList.remove('fade-out');
                updateCounter();
            } catch (_) {
                flashStatus('Photo failed to load');
            } finally {
                busy = false;
            }
        }

        function showNext() { return showAt(index + 1); }
        function showPrev() { return showAt(index - 1); }

        function reshufflePhotos() {
            if (!photos.length) return;
            rebuildOrder(0);
            flashStatus('Photos shuffled');
            showAt(0);
            startTimer();
            playRandomMusic(true);
        }

        function rebuildMusicOrder() {
            musicOrder = shuffle(musicTracks.map(t => t.url));
            musicIndex = -1;
        }

        function playRandomMusic(showMessage = false) {
            if (!spotifyController || !musicOrder.length) return;
            musicIndex = Math.floor(Math.random() * musicOrder.length);
            musicAdvancePending = false;
            spotifyController.loadEntity(musicOrder[musicIndex]);
            setTimeout(() => {
                if (spotifyController) spotifyController.play();
            }, 450);
            if (showMessage) flashStatus('Random song');
        }

        function playNextShuffledMusic() {
            if (!spotifyController || !musicOrder.length) return;
            musicIndex = (musicIndex + 1) % musicOrder.length;
            musicAdvancePending = false;
            spotifyController.loadEntity(musicOrder[musicIndex]);
            setTimeout(() => {
                if (spotifyController) spotifyController.play();
            }, 450);
        }

        function updateMusicButton() {
            btnMusic.textContent = spotifyPlaying ? '⏸' : '♫';
        }

        function toggleMusic() {
            if (!spotifyController) {
                flashStatus('Use the Spotify bar above to play');
                return;
            }
            spotifyController.togglePlay();
        }

        function toggleMusicShuffle() {
            playRandomMusic(true);
        }

        window.onSpotifyIframeApiReady = (IFrameAPI) => {
            IFrameAPI.createController(
                document.getElementById('embed-iframe'),
                {
                    width: '100%',
                    height: '80',
                    url: SPOTIFY_PLAYLIST_URL
                },
                (EmbedController) => {
                    spotifyController = EmbedController;

                    EmbedController.addListener('playback_update', (e) => {
                        const d = e.data || {};
                        spotifyPlaying = !d.isPaused;
                        updateMusicButton();

                        if (!d.isPaused && d.duration && d.position && d.duration > 0) {
                            const nearEnd = d.position >= d.duration - 2000;
                            if (nearEnd && !musicAdvancePending) {
                                musicAdvancePending = true;
                                setTimeout(() => playNextShuffledMusic(), 1200);
                            }
                        }
                    });

                    EmbedController.addListener('ready', () => {
                        if (musicOrder.length) {
                            playRandomMusic();
                        }
                    });
                }
            );
        };

        document.getElementById('btn-next').addEventListener('click', () => showNext().then(startTimer));
        document.getElementById('btn-prev').addEventListener('click', () => showPrev().then(startTimer));
        document.getElementById('btn-play').addEventListener('click', () => setPlaying(!playing));
        document.getElementById('btn-shuffle').addEventListener('click', reshufflePhotos);
        document.getElementById('btn-music').addEventListener('click', toggleMusic);
        document.getElementById('btn-music').addEventListener('dblclick', (e) => {
            e.preventDefault();
            toggleMusicShuffle();
        });
        document.getElementById('btn-rainbow').addEventListener('click', burstRainbows);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showNext().then(startTimer);
            if (e.key === 'ArrowLeft') showPrev().then(startTimer);
            if (e.key === ' ') { e.preventDefault(); setPlaying(!playing); }
        });

        async function initSlideshow() {
            try {
                const [photosRes, tracksRes] = await Promise.all([
                    fetch('photos.json', { cache: 'no-store' }),
                    fetch('spotify-tracks.json', { cache: 'no-store' })
                ]);
                const data = await photosRes.json();
                photos = Array.isArray(data.photos) ? data.photos : [];
                intervalMs = (data.intervalSeconds || 5) * 1000;

                const trackData = await tracksRes.json();
                musicTracks = Array.isArray(trackData.tracks) ? trackData.tracks : [];
                rebuildMusicOrder();
            } catch (_) {
                photos = [];
                musicTracks = [];
            }

            if (!photos.length) {
                counterEl.textContent = 'No photos';
                flashStatus('No photos found');
                setPlaying(false);
                return;
            }

            rebuildOrder(0);
            flashStatus(`${photos.length} photos — shuffling`);
            await showAt(0);
            setPlaying(true);

            if (spotifyController && musicOrder.length) {
                playRandomMusic();
            }
        }

        initSlideshow();

        const snowContainer = document.getElementById('snow-container');
        const colors = ['#ff3366', '#ff9933', '#ffff33', '#33cc33', '#3399ff', '#9933ff'];
        const elements = ['🌈', '✨', '⭐', '🎈', '🌸'];

        function createFlake(isBurst = false) {
            const flake = document.createElement('div');
            flake.className = 'flake';
            if (Math.random() > 0.4) {
                flake.innerText = elements[Math.floor(Math.random() * elements.length)];
            } else {
                flake.innerText = '●';
                flake.style.color = colors[Math.floor(Math.random() * colors.length)];
                flake.style.textShadow = '0 0 8px ' + flake.style.color;
            }
            flake.style.left = (Math.random() * window.innerWidth) + 'px';
            flake.style.fontSize = (Math.random() * 1.2 + 0.6) + 'rem';
            const duration = isBurst ? (Math.random() * 2 + 1.5) : (Math.random() * 4 + 4);
            flake.style.animationDuration = duration + 's';
            if (isBurst) {
                flake.style.top = (Math.random() * (window.innerHeight * 0.3) + (window.innerHeight * 0.35)) + 'px';
            }
            snowContainer.appendChild(flake);
            setTimeout(() => flake.remove(), duration * 1000);
        }

        setInterval(() => {
            if (document.querySelectorAll('.flake').length < 40) createFlake();
        }, 300);

        function burstRainbows() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => createFlake(true), i * 15);
            }
        }

        const canvas = document.getElementById('rainbow-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let mouse = { x: width / 2, y: height / 2 };
        let hue = 0;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        }, { passive: true });

        (function animateCanvas() {
            ctx.fillStyle = 'rgba(7, 6, 15, 0.08)';
            ctx.fillRect(0, 0, width, height);
            const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 10, mouse.x, mouse.y, 140);
            gradient.addColorStop(0, `hsla(${hue}, 100%, 65%, 0.12)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 140, 0, Math.PI * 2);
            ctx.fill();
            hue = (hue + 1.5) % 360;
            requestAnimationFrame(animateCanvas);
        })();
    </script>
</body>
</html>
