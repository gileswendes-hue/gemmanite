<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma's Rainbow World</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0b21;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Rainbow canvas background */
        #rainbow-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Falling rainbows/stars container */
        #snow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Center Card */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        0 0 40px rgba(255, 0, 128, 0.2),
                        0 0 40px rgba(0, 255, 255, 0.2);
            animation: float 6s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        /* Image styling with neon pulsing rainbow glow */
        .image-wrapper {
            position: relative;
            margin: 20px auto;
            width: 280px;
            height: 370px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .image-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000
            );
            animation: spin 4s linear infinite;
            z-index: 1;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .image-wrapper img {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(100% - 12px);
            height: calc(100% - 12px);
            object-fit: cover;
            border-radius: 12px;
            z-index: 2;
            background: #222;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #fff;
            background: linear-gradient(to right, #ff3366, #ff9933, #ffff33, #33cc33, #3399ff, #9933ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 8px rgba(0,0,0,0.5));
        }

        p {
            color: #e0e0ff;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Dynamic Interaction Button */
        .rainbow-btn {
            background: linear-gradient(45deg, #ff0055, #9900ff, #0099ff);
            background-size: 200% 200%;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 128, 0.4);
            transition: all 0.3s ease;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.6);
        }

        .rainbow-btn:active {
            transform: scale(0.95);
        }

        /* Falling Flake Style */
        .flake {
            position: absolute;
            user-select: none;
            pointer-events: none;
            font-size: 1.5rem;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <canvas id="rainbow-canvas"></canvas>
    <div id="snow-container"></div>

    <div class="card">
        <h1>Gemma</h1>
        <p>Pure Magic & Awesome Vibes ✨</p>
        
        <div class="image-wrapper">
            <img src="PXL_20240817_004956824.jpg" alt="Gemma">
        </div>

        <button class="rainbow-btn" onclick="burstRainbows()">More Rainbows!</button>
    </div>

    <script>
        // 1. Rainbow Falling Snow Matrix
        const snowContainer = document.getElementById('snow-container');
        const colors = ['#ff3366', '#ff9933', '#ffff33', '#33cc33', '#3399ff', '#9933ff'];
        const elements = ['🌈', '✨', '⭐', '🎈', '🌸'];

        function createFlake(isBurst = false, xPos = null) {
            const flake = document.createElement('div');
            flake.className = 'flake';
            
            // Randomly decide if it's a symbol or a custom colored circle
            if (Math.random() > 0.4) {
                flake.innerText = elements[Math.floor(Math.random() * elements.length)];
            } else {
                flake.innerText = '●';
                flake.style.color = colors[Math.floor(Math.random() * colors.length)];
                flake.style.textShadow = '0 0 8px ' + flake.style.color;
            }

            // Positioning
            const startLeft = xPos !== null ? xPos : Math.random() * 100;
            flake.style.left = startLeft + 'vw';
            
            // Sizing & Speed
            const size = Math.random() * 1.5 + 0.8;
            flake.style.fontSize = size + 'rem';
            
            const duration = isBurst ? (Math.random() * 2 + 2) : (Math.random() * 4 + 4);
            flake.style.animationDuration = duration + 's';
            
            // Random horizontal drift
            flake.style.marginHorizontal = (Math.random() * 50 - 25) + 'px';

            if (isBurst) {
                flake.style.top = (Math.random() * 40 + 30) + 'vh';
                // Adjust animation to start immediately from current burst height
                flake.style.animationName = 'fall';
            }

            snowContainer.appendChild(flake);

            // Remove after animation finishes
            setTimeout(() => {
                flake.remove();
            }, duration * 1000);
        }

        // Generate steady background rainbow snow
        setInterval(() => {
            if (document.querySelectorAll('.flake').length < 60) {
                createFlake();
            }
        }, 200);

        // Initial batch
        for(let i=0; i<20; i++) {
            setTimeout(() => createFlake(), Math.random() * 3000);
        }

        // 2. Interactive Burst Button Function
        function burstRainbows() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const randomX = Math.random() * 100;
                    createFlake(true, randomX);
                }, i * 20);
            }
        }

        // 3. Dynamic Interactive Canvas Backdrop (Responsive mouse lines)
        const canvas = document.getElementById('rainbow-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        let mouse = { x: width / 2, y: height / 2 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        let hue = 0;
        function animateCanvas() {
            ctx.fillStyle = 'rgba(13, 11, 33, 0.06)'; // Soft trail fade
            ctx.fillRect(0, 0, width, height);

            // Glowing cursor aura
            let gradient = ctx.createRadialGradient(mouse.x, mouse.y, 10, mouse.x, mouse.y, 150);
            gradient.addColorStop(0, `hsla(${hue}, 100%, 65%, 0.15)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 150, 0, Math.PI * 2);
            ctx.fill();

            hue = (hue + 1) % 360;
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();
    </script>
</body>
</html>
