<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma's Rainbow World</title>
    <style>
        :root {
            --bg-color: #0d0b21;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.18);
            --neon-glow: rgba(255, 0, 128, 0.25);
            --cyan-glow: rgba(0, 255, 255, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* --- SPOTIFY NOW PLAYING TOP BAR --- */
        .spotify-top-bar {
            position: absolute;
            top: 20px;
            width: calc(100% - 40px);
            max-width: 440px;
            height: 80px;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        .spotify-top-bar iframe {
            border-radius: 12px;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- MEDIA CONTROLS DOCK --- */
        .control-dock {
            position: absolute;
            bottom: 24px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 12px 32px;
            display: flex;
            align-items: center;
            gap: 28px;
            z-index: 100;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 25px rgba(153, 0, 255, 0.15);
        }

        .dock-btn {
            background: none;
            border: none;
            fill: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), fill 0.2s ease;
        }

        .dock-btn:hover {
            transform: scale(1.2);
            fill: #00ffcc;
        }

        .dock-btn:active {
            transform: scale(0.9);
        }

        .dock-btn.play-pause {
            background: linear-gradient(45deg, #ff0055, #9900ff);
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 6px 15px rgba(255, 0, 85, 0.4);
        }
        
        .dock-btn.play-pause:hover {
            box-shadow: 0 6px 22px rgba(0, 255, 204, 0.5);
        }

        #rainbow-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #snow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Center Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 32px;
            text-align: center;
            max-width: 440px;
            width: 100%;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 
                        0 0 50px var(--neon-glow),
                        0 0 50px var(--cyan-glow);
            animation: float 6s ease-in-out infinite;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            margin-top: 40px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(0.5deg); }
        }

        .image-wrapper {
            position: relative;
            margin: 16px auto;
            width: 100%;
            max-width: 240px;
            height: 300px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .image-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000
            );
            animation: spin 5s linear infinite;
            z-index: 1;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .image-wrapper img {
            position: absolute;
            top: 5px;
            left: 5px;
            width: calc(100% - 10px);
            height: calc(100% - 10px);
            object-fit: cover;
            border-radius: 20px;
            z-index: 2;
            background: #151329;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            color: #fff;
            background: linear-gradient(to right, #ff3366, #ff9933, #ffff33, #33cc33, #3399ff, #9933ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.4));
        }

        p {
            color: #e2e2ff;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }

        .rainbow-btn {
            background: linear-gradient(45deg, #ff0055, #9900ff, #0099ff);
            background-size: 200% 200%;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 0, 128, 0.35);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 204, 0.5);
        }

        @media (max-height: 660px) {
            .image-wrapper { max-height: 200px; }
            .card { padding: 16px; margin-top: 60px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Spotify Now Playing Header -->
    <div class="spotify-top-bar" id="spotify-container">
        <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX10zKzsJ2jva?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <canvas id="rainbow-canvas"></canvas>
    <div id="snow-container"></div>

    <!-- Main Content Card -->
    <div class="card">
        <h1>Gemma</h1>
        <p>Pure Magic & Brilliance ✨</p>
        
        <div class="image-wrapper">
            <img src="PXL_20240817_004956824.jpg" alt="Gemma">
        </div>

        <button class="rainbow-btn" onclick="burstRainbows()">More Rainbows!</button>
    </div>

    <!-- UI Audio Controls Bottom Dock -->
    <div class="control-dock">
        <button class="dock-btn" onclick="handleMediaControl('back')" aria-label="Previous Track">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 18V6z"/></svg>
        </button>
        <button class="dock-btn play-pause" onclick="handleMediaControl('toggle')" aria-label="Play or Pause">
            <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="dock-btn" onclick="handleMediaControl('next')" aria-label="Next Track">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
        </button>
    </div>

    <script>
        let isPlaying = false;
        function handleMediaControl(action) {
            console.log(`Media Action Triggered: ${action}`);
            const spotifyContainer = document.getElementById('spotify-container');
            
            if (action === 'toggle') {
                isPlaying = !isPlaying;
                const playIcon = document.getElementById('play-icon');
                if (isPlaying) {
                    playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                    spotifyContainer.style.opacity = "1";
                } else {
                    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                    spotifyContainer.style.opacity = "0.1";
                }
            }
        }

        const snowContainer = document.getElementById('snow-container');
        const colors = ['#ff3366', '#ff9933', '#ffff33', '#33cc33', '#3399ff', '#9933ff'];
        const elements = ['🌈', '✨', '⭐', '🎈', '🌸'];

        function createFlake(isBurst = false, xPos = null) {
            const flake = document.createElement('div');
            flake.className = 'flake';
            
            if (Math.random() > 0.4) {
                flake.innerText = elements[Math.floor(Math.random() * elements.length)];
            } else {
                flake.innerText = '●';
                flake.style.color = colors[Math.floor(Math.random() * colors.length)];
                flake.style.textShadow = '0 0 8px ' + flake.style.color;
            }

            const startLeft = xPos !== null ? xPos : Math.random() * 100;
            flake.style.left = startLeft + 'vw';
            
            const size = Math.random() * 1.2 + 0.6;
            flake.style.fontSize = size + 'rem';
            
            const duration = isBurst ? (Math.random() * 2 + 1.5) : (Math.random() * 4 + 4);
            flake.style.animationDuration = duration + 's';

            if (isBurst) {
                flake.style.top = (Math.random() * 30 + 35) + 'vh';
                flake.style.animationName = 'fall';
            }

            snowContainer.appendChild(flake);

            setTimeout(() => {
                flake.remove();
            }, duration * 1000);
        }

        setInterval(() => {
            if (document.querySelectorAll('.flake').length < 40) {
                createFlake();
            }
        }, 300);

        function burstRainbows() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createFlake(true, Math.random() * 100);
                }, i * 15);
            }
        }

        const canvas = document.getElementById('rainbow-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        let mouse = { x: width / 2, y: height / 2 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        }, { passive: true });

        let hue = 0;
        function animateCanvas() {
            ctx.fillStyle = 'rgba(13, 11, 33, 0.08)';
            ctx.fillRect(0, 0, width, height);

            let gradient = ctx.createRadialGradient(mouse.x, mouse.y, 10, mouse.x, mouse.y, 140);
            gradient.addColorStop(0, `hsla(${hue}, 100%, 65%, 0.1)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 140, 0, Math.PI * 2);
            ctx.fill();

            hue = (hue + 1.5) % 360;
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();
    </script>
</body>
</html>
